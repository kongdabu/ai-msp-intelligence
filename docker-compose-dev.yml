version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg15
    container_name: aimsp-db-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: aimspdb
      POSTGRES_USER: aimsp
      POSTGRES_PASSWORD: aimsp_dev
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
      - ./docker/init-pgvector.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aimsp -d aimspdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dev_postgres_data:
