databases:
  - name: aimsp-postgres
    databaseName: aimspdb
    user: aimsp
    plan: free

services:
  - type: web
    name: aimsp-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false   # Render 대시보드에서 직접 입력: jdbc:postgresql://<host>/<db>
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: aimsp-postgres
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: aimsp-postgres
          property: password
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: GEMINI_API_KEY
        sync: false   # Render 대시보드에서 직접 입력
    healthCheckPath: /actuator/health
