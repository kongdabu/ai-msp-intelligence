services:
  - type: web
    name: aimsp-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        sync: false   # jdbc:postgresql://db.xxxx.supabase.co:5432/postgres
      - key: DB_USERNAME
        sync: false   # postgres
      - key: DB_PASSWORD
        sync: false   # Supabase DB 비밀번호
      - key: GEMINI_API_KEY
        sync: false   # Render 대시보드에서 직접 입력
    healthCheckPath: /actuator/health
