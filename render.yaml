services:
  - type: web
    name: aimsp-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        value: jdbc:h2:file:/tmp/aimspdb
      - key: DB_USERNAME
        value: sa
      - key: DB_PASSWORD
        value: ""
      - key: GEMINI_API_KEY
        sync: false   # Render 대시보드에서 직접 입력
    healthCheckPath: /actuator/health
